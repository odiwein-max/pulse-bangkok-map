<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pulse Bangkok Live Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    .map-header {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    .map-title {
      font-size: 16px;
      font-weight: 700;
    }

    .map-subtitle {
      font-size: 13px;
      color: #555;
    }

    .map-status {
      margin-top: 4px;
      font-size: 12px;
      color: #777;
    }

    /* CTA Button */
    .cta-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #ff5a3d;
      color: #fff;
      padding: 13px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
    }
    
    .cta-button:hover {
      opacity: 0.92;
    }

    .area-label {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 6px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      text-align: center;
      line-height: 1.2;
      max-width: 150px;
      white-space: normal;
      word-break: break-word;
    }

    .area-label-name {
      font-size: 12px;
      font-weight: 700;
      color: #222;
    }

    .area-label-vibe {
      font-size: 10.5px;
      color: #666;
      margin-top: 2px;
      font-weight: 600;
    }

    .popup-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .popup-line {
      font-size: 13px;
      margin: 3px 0;
    }
  </style>
</head>

<body>

<div class="map-header">
  <div class="map-title">Pulse Bangkok</div>
  <div class="map-subtitle">See where people are right now</div>
  <div id="status" class="map-status">Loading…</div>
</div>

<a href="https://t.me/PulseBangkokBot" class="cta-button">
  Check in on Telegram
</a>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_URL = "https://pulse-bangkok-bot-production.up.railway.app/api/heatmap";
const MAPTILER_KEY = "4cnGgtT3i26LYrwP5feB";

const map = L.map("map").setView([13.7563, 100.5018], 12);

L.tileLayer(
  `https://api.maptiler.com/maps/openstreetmap/256/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`
).addTo(map);

let layers = [];
let intervals = [];

function clearAll(){
  layers.forEach(l => map.removeLayer(l));
  layers = [];
  intervals.forEach(i => clearInterval(i));
  intervals = [];
}

function getTopVibes(vibes){
  const entries = Object.entries(vibes || {});
  if (!entries.length) return {text:"quiet", emojis:"", primary:null};

  entries.sort((a,b)=>b[1]-a[1]);
  const [top, count] = entries[0];
  const second = entries[1];

  const emoji = {
    Work:"💻", Social:"🧑‍🤝‍🧑", Chill:"☕", Explore:"🗺️", Drinks:"🍻"
  };

  let text = `mostly ${top}`;
  let emojis = emoji[top] || "";

  if (second && second[1]/count >= 0.7){
    text += ` • shifting to ${second[0]}`;
    emojis += " " + (emoji[second[0]] || "");
  }

  const hour = new Date().getHours();

  if (hour >= 21 && top === "Drinks") text = `late night • ${text}`;
  if (hour >= 17 && top === "Social") text = `evening vibe • ${text}`;

  return {text, emojis, primary: top};
}

function color(v){
  return {
    Work:"#4361ee",
    Social:"#f72585",
    Chill:"#2a9d8f",
    Explore:"#ffb703",
    Drinks:"#e63946"
  }[v] || "#888";
}

function pulse(circle, base){
  let grow=true, r=base;

  const id=setInterval(()=>{
    const step=base*0.01;
    const max=base*1.06;

    r += grow ? step : -step;

    if(r>=max){r=max;grow=false;}
    if(r<=base){r=base;grow=true;}

    circle.setRadius(r);
  },180);

  intervals.push(id);
}

function render(data){
  clearAll();

  let total=0, active=0;

  (data.areas||[]).forEach(a=>{
    total += a.total || 0;
    if(a.total>0) active++;

    const size = a.total>=6?1200:a.total>=3?800:a.total>=1?500:300;

    const top = getTopVibes(a.vibes);
    const c = color(top.primary);

    const circle = L.circle([a.lat,a.lng],{
      radius:size,
      color:c,
      fillColor:c,
      fillOpacity:0.35
    }).addTo(map);

    layers.push(circle);

    if(a.total>0) pulse(circle,size);

    const label = L.marker([a.lat,a.lng],{
      icon: L.divIcon({
  className: "custom-label",
  html: `
    <div class="area-label" style="border-left:4px solid ${c}">
      <div class="area-label-name">${a.area}</div>
      <div class="area-label-vibe">${top.emojis} ${top.text}</div>
    </div>
  `,
  iconSize: [140, 40],
  iconAnchor: [70, 20]
})
    }).addTo(map);

    layers.push(label);
  });

  document.getElementById("status").textContent =
    `${total} people • ${active} active areas`;
}

async function load(){
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    render(data);
  }catch(e){
    document.getElementById("status").textContent="Live data unavailable";
  }
}

load();
setInterval(load,30000);
</script>

</body>
</html>
